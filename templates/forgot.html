<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">
    <div class="auth-card">

        <h2>Reset Password</h2>
        <p class="auth-sub">Enter your email to recover your account</p>

        {% if error %}
        <p style="color: #ff6b6b; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}

        {% if message %}
        <p style="color: #4ade80; margin-bottom: 15px;">{{ message }}</p>
        {% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <button type="submit" class="btn-primary">Recover Password</button>
        </form>

        <p class="auth-switch">
            <a href="/login">Back to Login</a>
        </p>

    </div>
</div>

</body>
</html>
